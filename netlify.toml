[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "http://julianestoll.com/*"
  to = "https://julianestoll.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.julianestoll.com/*"
  to = "https://julianestoll.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.julianestoll.com/*"
  to = "https://julianestoll.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
